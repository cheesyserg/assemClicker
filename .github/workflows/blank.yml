name: Auto Build and Release

on:
  push:
    branches:
      - main  # Trigger on every push to main
  workflow_dispatch:

permissions:
  contents: write  # Crucial: Allows the bot to create tags and releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can push tags back

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Run Build Script
        shell: cmd
        run: |
          if not exist app_icon.ico echo. > app_icon.ico
          call build.bat

      - name: Create and Push Tag
        shell: bash
        run: |
          # Creates a unique tag using the build number
          TAG_NAME="v0.1.${{ github.run_number }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: clicker.exe
          tag_name: ${{ env.TAG_NAME }} # Uses the tag we just created
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
