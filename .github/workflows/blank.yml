name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86 # Crucial for finding ml.exe

      - name: Run Build Script
        shell: cmd
        run: |
          :: If you haven't uploaded an icon yet, this creates a dummy one
          :: so the resource compiler doesn't crash.
          if not exist app_icon.ico echo. > app_icon.ico
          call build.bat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: clicker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
